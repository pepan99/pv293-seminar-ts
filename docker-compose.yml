services:
  api-gateway:
    build:
      context: .
      dockerfile: ./apps/api-gateway/Dockerfile
    ports:
      - "3000:3000"
    networks:
      - microservices-network
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres-accounts:
        condition: service_healthy
      postgres-users:
        condition: service_healthy
      postgres-auth:
        condition: service_healthy
      accounts-service:
        condition: service_started
      users-service:
        condition: service_started
      auth-service:
        condition: service_started
    env_file:
      - ./apps/api-gateway/.env
    environment:
      - RABBITMQ_URI=amqp://admin:admin@rabbitmq:5672
    restart: unless-stopped

  accounts-service:
    build:
      context: .
      dockerfile: ./apps/accounts-service/Dockerfile
    ports:
      - "3001:3001"
    networks:
      - microservices-network
    depends_on:
      postgres-accounts:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - ./apps/accounts-service/.env
    environment:
      - POSTGRES_HOST=postgres-accounts
      - RABBITMQ_URI=amqp://admin:admin@rabbitmq:5672
      - RABBITMQ_HOST=rabbitmq
    restart: unless-stopped

  users-service:
    build:
      context: .
      dockerfile: ./apps/users-service/Dockerfile
    ports:
      - "3002:3002"
    networks:
      - microservices-network
    depends_on:
      postgres-users:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - ./apps/users-service/.env
    environment:
      - POSTGRES_HOST=postgres-users
      - RABBITMQ_URI=amqp://admin:admin@rabbitmq:5672
      - RABBITMQ_HOST=rabbitmq
    restart: unless-stopped

  auth-service:
    build:
      context: .
      dockerfile: ./apps/auth-service/Dockerfile
    ports:
      - "3003:3003"
    networks:
      - microservices-network
    depends_on:
      postgres-auth:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - ./apps/auth-service/.env
    environment:
      - POSTGRES_HOST=postgres-auth
      - RABBITMQ_URI=amqp://admin:admin@rabbitmq:5672
      - RABBITMQ_HOST=rabbitmq
    restart: unless-stopped

  postgres-accounts:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    networks:
      - microservices-network
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: accounts_db
    volumes:
      - postgres_accounts_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  postgres-users:
    image: postgres:17-alpine
    ports:
      - "5433:5432"
    networks:
      - microservices-network
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: users_db
    volumes:
      - postgres_users_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  postgres-auth:
    image: postgres:17-alpine
    ports:
      - "5434:5432"
    networks:
      - microservices-network
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth_db
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"  # AMQP protocol port
      - "15672:15672"  # Management UI port
    networks:
      - microservices-network
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

networks:
  microservices-network:
    driver: bridge

volumes:
  postgres_accounts_data:
  postgres_users_data:
  postgres_auth_data:
  rabbitmq_data:
