services:
  postgres:
    container_name: nestjs-kysely-postgres
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    networks:
      - postgres
    env_file:
      - docker.env
    volumes:
      - ./init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
 
  pgadmin:
    container_name: nestjs-kysely-pgadmin
    image: dpage/pgadmin4
    networks:
      - postgres
    ports:
      - "8080:80"
    env_file:
      - docker.env
 
